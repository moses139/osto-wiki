<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>TERA - NPC Soundboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
  :root {
    --tera-bg: #050810;
    --tera-panel: #101827;
    --tera-accent: #3aa2ff;
    --text-main: #e5f0ff;
    --text-muted: #8aa0c5;
    --border-soft: #25324a;
    --green: #3bff6a;
    --shadow-soft: 0 12px 30px rgba(0, 0, 0, 0.65);
  }

  * {
    box-sizing: border-box;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  body {
    margin: 0;
    padding: 16px;
    min-height: 100vh;
    background: radial-gradient(circle at top, #1a2340 0, #050810 55%);
    color: var(--text-main);
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  .app {
    width: 100%;
    max-width: 900px;
    background: linear-gradient(145deg, #101827, #060914);
    border-radius: 14px;
    border: 1px solid var(--border-soft);
    box-shadow: var(--shadow-soft);
    padding: 18px;
  }

  .app-title {
    text-align: center;
    font-size: 1.1rem;
    letter-spacing: 0.03em;
    color: var(--tera-accent);
    margin-bottom: 6px;
  }

  .copyright {
    text-align: center;
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-bottom: 14px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  .calc-card {
    padding: 22px;
    border-radius: 10px;
    background: radial-gradient(circle at top left, #1b2744 0, #060914 60%);
    border: 1px solid #1a2436;
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.2s ease;
    text-align: center;

    /* NEW: better layout */
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .calc-card:hover {
    transform: scale(1.02);
    border-color: var(--tera-accent);
  }

  .calc-title {
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .sound-button {
    width: 250px;
    height: 250px;
    object-fit: cover;
    border-radius: 16px;
    border: 2px solid rgba(86, 99, 124, 0.8);
    transition: transform 0.15s ease, border-color 0.2s ease;
  }

  .calc-card:hover .sound-button {
    transform: scale(1.05);
    border-color: var(--tera-accent);
  }

  .result-label {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 6px;
  }

  @media (max-width: 768px) {
    .grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>

<body>

<div class="app">
  <div class="app-title">TERA - NPC Soundboard</div>

  <div class="grid">

    <div class="calc-card" onclick="playSound('tools/sounds/YouNeedAnythingFromMe.mp3', this)">
      <div class="calc-title">You Need Anything From Me?</div>

      <img class="sound-button"
           src="pictures/popori.png"
           alt="Play Sound" />

    </div>
	
	    <div class="calc-card" onclick="playSound('tools/sounds/YouNeedAnythingFromMe.mp3', this)">
      <div class="calc-title">You Need Anything From Me?</div>

      <img class="sound-button"
           src="pictures/popori.png"
           alt="Play Sound" />

    </div>


	    <div class="calc-card" onclick="playSound('tools/sounds/YouNeedAnythingFromMe.mp3', this)">
      <div class="calc-title">You Need Anything From Me?</div>

      <img class="sound-button"
           src="pictures/popori.png"
           alt="Play Sound" />

    </div>
		    <div class="calc-card" onclick="playSound('tools/sounds/YouNeedAnythingFromMe.mp3', this)">
      <div class="calc-title">You Need Anything From Me?</div>

      <img class="sound-button"
           src="pictures/popori.png"
           alt="Play Sound" />

    </div>
  </div>
</div>

<script>
const audioCache = {};
let currentAudio = null;

function getAudio(src) {
  if (!audioCache[src]) {
    const audio = new Audio(src);
    audio.preload = "auto";
    audioCache[src] = audio;
  }
  return audioCache[src];
}

function resetAll() {
  document.querySelectorAll('.calc-card').forEach(card => {
    card.style.borderColor = "#1a2436";
  });
}

function playSound(src, card) {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }

  resetAll();

  const audio = getAudio(src);
  currentAudio = audio;

  audio.currentTime = 0;

  card.style.borderColor = "#3bff6a";

  audio.onended = () => {
    card.style.borderColor = "#1a2436";
  };

  audio.onpause = () => {
    card.style.borderColor = "#1a2436";
  };

  const playPromise = audio.play();

  if (playPromise !== undefined) {
    playPromise.catch(err => {
      console.error("Audio failed:", err);
    });
  }
}
</script>

</body>
</html>
